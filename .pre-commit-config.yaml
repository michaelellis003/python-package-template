repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.1
    hooks:
      - id: ruff-format # formatter
        types_or: [python, pyi, jupyter, toml]
      - id: ruff # linter
        types_or: [python, pyi, jupyter, toml]
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.391
    hooks:
    -   id: pyright